<!DOCTYPE html>
<html lang="bg">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Въпросите на Скрити Лимонки</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
</head>

<body>

<div class="overlay"></div>

<img src="logo.png" class="logo" alt="Лого на Скрити Лимонки">

<div class="quiz-container">
  <h1 class="title">ВЪПРОСИТЕ НА СКРИТИ ЛИМОНКИ</h1>

  <div class="quiz-frame">
    <div id="counter" class="counter"></div>
    <div id="category" class="category"></div>
    <div id="question" class="question"></div>
    <div id="answer" class="answer"></div>

    <div class="buttons">
  <button id="answerBtn" class="btn">ПОКАЖИ ОТГОВОР</button>

  <div class="btn-row">
    <button id="prevBtn" class="btn next">ПРЕДИШЕН ВЪПРОС</button>
    <button id="nextBtn" class="btn next">СЛЕДВАЩ ВЪПРОС</button>
  </div>

  <button id="fullscreenBtn" class="btn">ЦЯЛ ЕКРАН</button>
</div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
